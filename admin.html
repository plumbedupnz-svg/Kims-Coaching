<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Kim Jones Coaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin-availability.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav" aria-label="Primary navigation">
        <a href="index.html" class="brand" aria-label="Kim Jones Coaching home">
          <span class="brand-main">KIM JONES</span>
          <span class="brand-sub">COACHING</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="Open menu" aria-controls="primary-nav" aria-expanded="false" data-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-nav" data-nav-links>
          <a href="index.html#about">About</a>
          <a href="index.html#programmes">Programmes</a>
          <a href="index.html#contact">Contact</a>
          <a href="shop.html">Shop</a>
          <a href="account.html" data-auth-private hidden>My Account</a>
          <button class="nav-button" type="button" data-sign-out hidden>Sign Out</button>
        </div>
      </nav>
    </header>

    <main>
      <section class="section" id="admin">
        <div class="container owner-wrap">
          <div class="section-head">
            <p class="eyebrow">Admin Dashboard</p>
            <h1>Manage lesson availability</h1>
            <p id="owner-status" class="helper-text"></p>
          </div>

          <div id="owner-panel" hidden>
            <div class="admin-panel-grid">
              <section class="admin-primary">
                <form class="availability-form" data-availability-form>
                  <div class="availability-form-head">
                    <div>
                      <h2>Lesson times</h2>
                      <p class="helper-text">Create open lesson slots or block out times Kim is unavailable.</p>
                    </div>
                    <button class="btn btn-secondary" type="button" data-cancel-availability-edit hidden>Cancel edit</button>
                  </div>
                  <input type="hidden" name="availability_id" data-availability-id />
                  <div class="availability-grid">
                    <label>
                      Date
                      <input type="date" name="slot_date" required />
                    </label>
                    <label>
                      Start time
                      <select name="start_time" data-time-select required>
                        <option value="">Select start time</option>
                      </select>
                    </label>
                    <label>
                      End time
                      <select name="end_time" data-time-select required>
                        <option value="">Select end time</option>
                      </select>
                    </label>
                    <label>
                      Slot type
                      <select name="is_available" required>
                        <option value="true">Available for lessons</option>
                        <option value="false">Blocked out</option>
                      </select>
                    </label>
                    <label class="availability-repeat">
                      <span>Repeat weekly</span>
                      <input type="checkbox" name="recurring_weekly" data-recurring-weekly />
                    </label>
                    <label>
                      Number of weeks
                      <input type="number" name="repeat_weeks" min="1" max="52" value="1" data-repeat-weeks />
                    </label>
                    <label class="availability-wide">
                      Internal label
                      <input type="text" name="recurrence_label" placeholder="e.g. Tuesday after-school lessons" />
                    </label>
                  </div>
                  <button class="btn btn-primary" type="submit" data-save-availability>Save lesson time</button>
                  <p class="form-message" data-availability-message></p>
                </form>

                <div class="availability-list" data-availability-list></div>
              </section>

              <div class="admin-secondary">
                <form id="owner-promo-form" class="owner-add-form">
                  <h3>Promo Code Settings</h3>
                  <input id="owner-promo-code" type="text" placeholder="Promo code (e.g. KIM20)" />
                  <input id="owner-promo-percent" type="number" step="0.01" min="0" max="100" placeholder="Promo discount %" />
                  <button type="submit" class="btn btn-primary">Save Promo Settings</button>
                  <p class="helper-text" id="owner-promo-status"></p>
                </form>

                <form id="owner-add-form" class="owner-add-form">
                  <h3>Add Product</h3>
                  <input id="owner-product-name" type="text" placeholder="Product name" required />
                  <input id="owner-product-price" type="number" step="0.01" min="0" placeholder="Price" required />
                  <input id="owner-product-discount" type="number" step="0.01" min="0" max="100" placeholder="Discount % (optional)" />
                  <label for="owner-product-category">Category</label>
                  <select id="owner-product-category" required>
                    <option value="">Select category</option>
                  </select>
                  <div class="category-add-row">
                    <input id="owner-new-category" type="text" placeholder="Add new category" />
                    <button type="button" class="btn btn-secondary" id="add-category-btn">Add Category</button>
                  </div>
                  <input id="owner-product-desc" type="text" placeholder="Short description" />
                  <label for="owner-product-image">Product image</label>
                  <input id="owner-product-image" type="file" accept="image/*" />
                  <button type="submit" class="btn btn-primary">Add Product</button>
                </form>

                <div class="owner-products" id="owner-products-list"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
    <script src="product-categories.js"></script>
    <script src="admin-availability-state.js"></script>
    <script src="admin-availability.js"></script>
  </body>
</html>
