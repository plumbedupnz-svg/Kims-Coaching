<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Kim Jones Coaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav" aria-label="Primary navigation">
        <a href="index.html" class="brand" aria-label="Kim Jones Coaching home">
          <span class="brand-main">KIM JONES</span>
          <span class="brand-sub">COACHING</span>
        </a>
        <button class="menu-toggle" type="button" aria-label="Open menu" aria-controls="primary-nav" aria-expanded="false" data-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-nav" data-nav-links>
          <a href="index.html#shop">Shop</a>
          <a href="index.html#about">About</a>
          <a href="index.html#philosophy">Philosophy</a>
          <a href="index.html#programmes">Programmes</a>
          <a href="index.html#contact">Contact</a>
          <a href="account.html" data-auth-public>Login</a>
          <a href="account.html?mode=signup" data-auth-public>Create Account</a>
          <a href="account.html" data-auth-private hidden>My Account</a>
          <button class="nav-button" type="button" data-sign-out hidden>Sign Out</button>
        </div>
      </nav>
    </header>
    <main>
      <section class="section" id="shop">
        <div class="container">
          <div class="section-head">
            <p class="eyebrow">SportsCo Products</p>
            <h2>Shop by category</h2>
          </div>
          <div class="shop-toolbar">
            <label for="category-filter" class="shop-filter-label">Filter by category</label>
            <select id="category-filter" class="shop-filter-select">
              <option value="all">All categories</option>
            </select>
          </div>

          <div id="product-list" class="shop-categories"></div>
        </div>
      </section>
      <section class="section alt" id="cart">
        <div class="container cart-layout">
          <div>
            <div class="section-head">
              <p class="eyebrow">Cart</p>
              <h2>Your selected items</h2>
            </div>
            <div id="cart-items" class="cart-items"></div>
          </div>
          <aside class="cart-summary" id="checkout">
            <h3>Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
            <div class="summary-row"><span>Estimated Tax (10%)</span><strong id="tax">$0.00</strong></div>
            <div class="summary-row"><span>Promo Discount</span><strong id="promo-discount">-$0.00</strong></div>
            <div class="summary-row total"><span>Total</span><strong id="total">$0.00</strong></div>
            
            <label for="promo-code">Promo Code</label>
            <div class="category-add-row">
              <input id="promo-code" type="text" placeholder="Enter promo code" />
              <button class="btn btn-secondary" id="apply-promo-btn" type="button">Apply</button>
            </div>
            <p class="helper-text" id="promo-message"></p>

            <p class="helper-text" id="checkout-account-message"></p>
            <button class="btn btn-primary full" id="checkout-btn">Proceed to Payment</button>
            <button class="btn btn-secondary full" id="clear-cart-btn">Clear Cart</button>
          </aside>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="email-service.js"></script>
    <script src="app.js"></script>
    <script src="shop-order-emails.js"></script>
    <script src="product-categories.js"></script>
  </body>
</html>
